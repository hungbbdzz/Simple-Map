name: Apply Simple Map 2.0 source

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .simplemap-upload/**
      - .simplemap-upload-xz/**

permissions:
  contents: write

jobs:
  apply-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .simplemap-upload-xz/part-*.b64 | base64 -d > /tmp/simplemap-v6.tar.xz
          rm -rf /tmp/simplemap-v6
          mkdir -p /tmp/simplemap-v6
          tar -xJf /tmp/simplemap-v6.tar.xz -C /tmp/simplemap-v6
          ROOT=/tmp/simplemap-v6/SimpleMap_Full_Source_Refactored_v6
          test -d "$ROOT/src/main/java"
          rm -rf src/main/java
          mkdir -p src/main
          cp -R "$ROOT/src/main/java" src/main/java
          sed -i 's/^mod_version=.*/mod_version=2.0.0/' gradle.properties
          rm -f download_textures.ps1 generate_logo.ps1
          rm -rf .simplemap-upload .simplemap-upload-xz
          rm -f .github/workflows/apply-v2-source.yml

      - name: Commit source update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: release Simple Map 2.0.0 major engine update"
          git push origin HEAD:main
